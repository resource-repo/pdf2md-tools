name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: convert_pdf-windows.exe
            bin: dist/convert_pdf.exe
          - os: macos-latest
            artifact: convert_pdf-macos-arm64
            bin: dist/convert_pdf
          - os: ubuntu-latest
            artifact: convert_pdf-linux
            bin: dist/convert_pdf

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get Python site-packages path
        id: site
        shell: bash
        run: echo "path=$(python -c 'import site; print(site.getsitepackages()[0])')" >> "$GITHUB_OUTPUT"

      - name: Cache site-packages
        id: cache-site
        uses: actions/cache@v4
        with:
          path: ${{ steps.site.outputs.path }}
          key: site-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-site.outputs.cache-hit != 'true'
        run: |
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Install PyInstaller (cache hit)
        if: steps.cache-site.outputs.cache-hit == 'true'
        run: pip install "pyinstaller>=6.0"

      - name: Build with PyInstaller
        run: pyinstaller convert_pdf.spec

      - name: Rename binary
        shell: bash
        run: cp ${{ matrix.bin }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
